name: Deploy calculator update

on:
  push:
    paths:
      - .deploy/site.tar.gz.b64.*
      - .github/workflows/unpack-site.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract site bundle
        run: |
          cat .deploy/site.tar.gz.b64.* > /tmp/site.tar.gz.b64
          base64 --decode /tmp/site.tar.gz.b64 > /tmp/site.tar.gz
          tar -xzf /tmp/site.tar.gz
      - name: Commit generated site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets
          if git diff --cached --quiet; then
            echo "No site changes"
          else
            git commit -m "Deploy brand vertical and mobile PDF fix"
            git push
          fi
